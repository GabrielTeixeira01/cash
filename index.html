<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculadora de Cashback</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0a0a;
      min-height: 100vh;
      padding: 40px 16px;
      color: #eee;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
    }

    .card {
      background: #141414;
      border: 0.5px solid #2a2a2a;
      border-radius: 12px;
      padding: 24px;
    }

    h1 {
      font-size: 11px;
      font-weight: 500;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    h2 {
      font-size: 20px;
      font-weight: 500;
      color: #eee;
      margin-bottom: 20px;
    }

    .saudacao {
      font-size: 13px;
      color: #666;
      margin-bottom: 16px;
      min-height: 18px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #666;
      margin-bottom: 6px;
    }

    select, input {
      width: 100%;
      padding: 10px 12px;
      background: #1e1e1e;
      border: 0.5px solid #333;
      border-radius: 8px;
      font-size: 14px;
      color: #eee;
      margin-bottom: 14px;
      outline: none;
      transition: border 0.2s;
    }

    select:focus, input:focus { border-color: #555; }
    select option { background: #1e1e1e; }

    button {
      width: 100%;
      padding: 12px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #ddd; }
    button:disabled { background: #333; color: #666; cursor: not-allowed; }

    .resultado {
      display: none;
      margin-top: 14px;
      background: #0f1f12;
      border: 0.5px solid #1f4a28;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }

    .resultado p { font-size: 12px; color: #4caf74; margin-bottom: 4px; }
    .resultado .valor { font-size: 32px; font-weight: 500; color: #4caf74; }

    .erro {
      display: none;
      color: #e05555;
      font-size: 13px;
      margin-top: 10px;
      text-align: center;
    }

    .hist-header {
      display: grid;
      grid-template-columns: 80px 1fr 1fr 1fr;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 0.5px solid #2a2a2a;
      margin-bottom: 4px;
    }

    .hist-header span { font-size: 11px; font-weight: 500; color: #555; }

    .hist-row {
      display: grid;
      grid-template-columns: 80px 1fr 1fr 1fr;
      gap: 8px;
      padding: 10px 0;
      border-bottom: 0.5px solid #1a1a1a;
      align-items: center;
    }

    .hist-row span { font-size: 13px; color: #bbb; }
    .hist-row .cash { color: #4caf74; font-weight: 500; }
    .hist-row .date { font-size: 11px; color: #555; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge.vip { background: #2a1f00; color: #EF9F27; }
    .badge.normal { background: #0d1a2e; color: #378ADD; }

    .empty { text-align: center; padding: 32px; color: #444; font-size: 13px; }
  </style>
</head>
<body>

  <div class="grid">
    <div class="card">
      <h1>Calculadora</h1>
      <h2>Cashback</h2>

      <label>Seu nome</label>
      <input type="text" id="nome" placeholder="Ex: João" oninput="atualizarSaudacao()" />

      <p class="saudacao" id="saudacao"></p>

      <label>Tipo de cliente</label>
      <select id="tipo_cliente">
        <option value="normal">Normal</option>
        <option value="vip">VIP</option>
      </select>

      <label>Valor da compra (R$)</label>
      <input type="number" id="valor" placeholder="Ex: 600,00" min="0" step="0.01" />

      <button id="btn" onclick="calcular()">Calcular cashback</button>

      <p class="erro" id="erro">Preencha todos os campos corretamente.</p>

      <div class="resultado" id="resultado">
        <p>Seu cashback</p>
        <div class="valor" id="valor_cashback">R$ 0,00</div>
      </div>
    </div>

    <div class="card">
      <h1>Histórico</h1>
      <h2>Consultas</h2>
      <div id="historico"><div class="empty">Carregando...</div></div>
    </div>
  </div>

  <script>
    // Como a API e o HTML agora rodam no mesmo servidor, as rotas podem ser relativas
    const API_URL = "";

    function atualizarSaudacao() {
      const nome = document.getElementById("nome").value.trim();
      const el = document.getElementById("saudacao");
      el.textContent = nome ? `Olá, ${nome}! Preencha os dados abaixo.` : "";
    }

    async function calcular() {
      const nome = document.getElementById("nome").value.trim();
      const tipo = document.getElementById("tipo_cliente").value;
      const valor = parseFloat(document.getElementById("valor").value);
      const erro = document.getElementById("erro");
      const btn = document.getElementById("btn");

      erro.style.display = "none";

      if (!nome) {
        erro.textContent = "Por favor, informe seu nome.";
        erro.style.display = "block";
        return;
      }

      if (!valor || valor <= 0) {
        erro.textContent = "Por favor, informe um valor válido.";
        erro.style.display = "block";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Calculando...";

      try {
        const res = await fetch(`${API_URL}/calcular`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ nome, tipo_cliente: tipo, valor })
        });

        const data = await res.json();

        document.getElementById("valor_cashback").textContent =
          "R$ " + data.cashback.toFixed(2).replace(".", ",");
        document.getElementById("resultado").style.display = "block";

        carregarHistorico();
      } catch (e) {
        erro.textContent = "Erro ao conectar com a API.";
        erro.style.display = "block";
      }

      btn.disabled = false;
      btn.textContent = "Calcular cashback";
    }

    async function carregarHistorico() {
      try {
        const res = await fetch(`${API_URL}/historico`);
        const data = await res.json();
        const div = document.getElementById("historico");

        if (!data.historico || data.historico.length === 0) {
          div.innerHTML = '<div class="empty">Nenhuma consulta ainda.</div>';
          return;
        }

        let html = `<div class="hist-header">
          <span>Tipo</span><span>Valor</span><span>Cashback</span><span>Data</span>
        </div>`;

        for (const row of data.historico) {
          const tipo = row.tipo_cliente;
          const badge = tipo === "VIP"
            ? '<span class="badge vip">VIP</span>'
            : '<span class="badge normal">Normal</span>';
          const data_fmt = new Date(row.criado_em).toLocaleString("pt-BR");
          html += `<div class="hist-row">
            <span>${badge}</span>
            <span>R$ ${parseFloat(row.valor).toFixed(2).replace(".", ",")}</span>
            <span class="cash">R$ ${parseFloat(row.cashback).toFixed(2).replace(".", ",")}</span>
            <span class="date">${data_fmt}</span>
          </div>`;
        }

        div.innerHTML = html;
      } catch (e) {
        document.getElementById("historico").innerHTML =
          '<div class="empty">Erro ao carregar histórico.</div>';
      }
    }

    carregarHistorico();
  </script>

</body>
</html>
